name = "taakhelden-api"
main = "src/index.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

# --- default/base-omgeving (production erft hiervan via [env.production]) ---
[[d1_databases]]
binding = "DB"
database_name = "taakhelden-db"
database_id = "031e773c-bad4-40fa-ad65-984f40c1992c"   # wrangler d1 create taakhelden-db --location=weur

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "taakhelden-photos"
jurisdiction = "eu"                                # EU data-residency voor kinderfoto's (AVG)

[[kv_namespaces]]
binding = "KV"
id = "5f1fabd9e81f4fd7843a7cbe8ba5f2ac"

[[durable_objects.bindings]]
name = "FAMILY_DO"
class_name = "FamilyRoom"

[[migrations]]
tag = "v1"
new_classes = ["FamilyRoom"]

[[queues.producers]]
binding = "PHOTO_QUEUE"
queue = "photo-processing"

[[queues.consumers]]
queue = "photo-processing"

[[queues.producers]]
binding = "EXPORT_QUEUE"
queue = "export-processing"

[[queues.consumers]]
queue = "export-processing"

[triggers]
crons = ["5 0 * * *", "*/15 * * * *"]  # 00:05 instance-generatie · elke 15 min notificaties

# Secrets (via `wrangler secret put`): JWT_SECRET, APNS_KEY, APNS_KEY_ID,
# APNS_TEAM_ID, APPLE_CLIENT_ID, TURNSTILE_SECRET, EMAIL_API_KEY, EMAIL_FROM
# Vars (optioneel): APP_BASE_URL (voor uitnodigings-links in e-mail)

[env.production]
name = "taakhelden-api-prod"
# production heeft eigen D1/R2/KV — id's invullen na aanmaken
