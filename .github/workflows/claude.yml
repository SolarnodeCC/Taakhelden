name: Claude Code

# @claude-mentions in issues en PR's laten Claude Code meedenken/reviewen.
# Bewust alleen op expliciete @claude-mention (geen auto-run op PR-open), zodat er
# geen rode CI ontstaat zolang ANTHROPIC_API_KEY nog niet is gezet.
# De bestaande ci.yml blijft de bron van waarheid voor groen/rood.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Alleen draaien als iemand @claude noemt.
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
