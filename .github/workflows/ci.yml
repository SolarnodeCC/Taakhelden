name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run typecheck
      - name: Tests (Workers-runtime)
        run: npm test
      - name: D1-migraties dry-run
        working-directory: apps/api
        run: npx wrangler d1 migrations apply taakhelden-db --local
