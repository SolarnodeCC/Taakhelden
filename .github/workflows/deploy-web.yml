name: Deploy web
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: deploy-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Build (OpenNext → Cloudflare Worker)
        working-directory: apps/web
        run: npm run build:cf
      - name: Deploy web worker
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "5546763229b35df670e33d9316d7f2e0"
        run: npx wrangler deploy
      - name: Smoke test
        run: curl --fail -sSL https://taakhelden-web.oostelaar.workers.dev/nl/login
