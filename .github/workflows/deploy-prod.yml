name: Deploy production
on:
  push:
    branches: [main]   # elke merge naar main deployt naar production
  workflow_dispatch:   # ook handmatig te starten

concurrency: deploy-prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: 20, cache: npm }
      - run: npm ci
      # accountId meegeven zodat wrangler de /memberships-lookup overslaat: een
      # scoped API-token heeft vaak geen "User → Memberships → Read" en faalt
      # anders met "Authentication error [code: 10000]". Account-ID is niet
      # geheim (staat in elke dashboard-URL).
      - name: D1-migraties (production)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: "5546763229b35df670e33d9316d7f2e0"
          workingDirectory: apps/api
          command: d1 migrations apply taakhelden-db --remote
      # Queues die in wrangler.toml gedeclareerd staan moeten bestaan vóór de
      # deploy. Idempotent: `|| true` negeert de "already exists"-fout bij een
      # tweede run. Vereist Queues → Edit op het token; ontbreekt dat, dan faalt
      # de Deploy-stap hieronder alsnog met "Queue ... does not exist".
      - name: Queues aanmaken (idempotent)
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "5546763229b35df670e33d9316d7f2e0"
        run: |
          npx wrangler queues create photo-processing || true
          npx wrangler queues create export-processing || true
      # R2-bucket in de EU-jurisdictie (AVG/data-residency voor kinderfoto's),
      # passend bij `jurisdiction = "eu"` op de PHOTOS-binding. Idempotent.
      - name: R2-bucket aanmaken (idempotent)
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "5546763229b35df670e33d9316d7f2e0"
        run: npx wrangler r2 bucket create taakhelden-photos --jurisdiction eu || true
      - name: Deploy API
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: "5546763229b35df670e33d9316d7f2e0"
          workingDirectory: apps/api
          command: deploy
      # Smoke-test tegen de workers.dev-URL zolang api.taakhelden.nl nog niet
      # als custom domain aan de worker gekoppeld is. Zet dit terug naar
      # https://api.taakhelden.nl/v1/health zodra dat domein gekoppeld is.
      - name: Smoke test
        run: curl --fail https://taakhelden-api.oostelaar.workers.dev/v1/health
