<!-- @startingPoint section="Screens" subtitle="Parent web dashboard, 5 sections + login" viewport="1200x760" -->
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="screens/LoginScreen.jsx"></script>
<script type="text/babel" src="screens/TodayScreen.jsx"></script>
<script type="text/babel" src="screens/ApprovalsScreen.jsx"></script>
<script type="text/babel" src="screens/TasksScreen.jsx"></script>
<script type="text/babel" src="screens/ShopScreen.jsx"></script>
<script type="text/babel" src="screens/InsightsScreen.jsx"></script>
<script type="text/babel" src="AppShell.jsx"></script>
<div id="root" style="background:var(--color-bg)"></div>
<script type="text/babel">
function App() {
  const [loggedIn, setLoggedIn] = React.useState(false);
  const [tab, setTab] = React.useState('vandaag');
  if (!loggedIn) return <window.LoginScreen onLogin={() => setLoggedIn(true)} />;
  const screens = { vandaag: window.TodayScreen, goedkeuren: window.ApprovalsScreen, taken: window.TasksScreen, winkel: window.ShopScreen, inzichten: window.InsightsScreen };
  const Screen = screens[tab];
  return <window.AppShell active={tab} onNavigate={setTab}><Screen/></window.AppShell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
