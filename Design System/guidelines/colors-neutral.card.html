<!-- @dsCard group="Colors" viewport="700x140" name="Neutrals & Surfaces" subtitle="bg / surface / border / text tokens" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:flex;font-family:var(--font-sans);font-size:12px">
<div style="flex:1;height:100px;background:var(--color-bg);border:1px solid var(--color-border);display:flex;align-items:flex-end;padding:6px">bg</div>
<div style="flex:1;height:100px;background:var(--color-surface);display:flex;align-items:flex-end;padding:6px">surface</div>
<div style="flex:1;height:100px;background:var(--color-border);display:flex;align-items:flex-end;padding:6px">border</div>
<div style="flex:1;height:100px;background:var(--color-text);color:#fff;display:flex;align-items:flex-end;padding:6px">text</div>
<div style="flex:1;height:100px;background:var(--color-text-muted);color:#fff;display:flex;align-items:flex-end;padding:6px">muted</div>
</div>
